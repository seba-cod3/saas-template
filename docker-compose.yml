services:
  pg-saas-template:
    image: postgres:16-alpine
    container_name: pg-saas-template
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis-saas-template:
    image: redis:7-alpine
    container_name: redis-saas-template
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit-saas-template
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  pgdata:
  redisdata: