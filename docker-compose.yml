services:
  pg-saas-template:
    image: postgres:16-alpine
    container_name: pg-saas-template
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis-saas-template:
    image: redis:7-alpine
    container_name: redis-saas-template
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: